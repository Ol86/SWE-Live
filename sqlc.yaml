version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/db/schema/schema.sql"
    queries:
      - "internal/db/query"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
